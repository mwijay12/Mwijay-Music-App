
<!doctype html>
<html lang="en">
  <head>
    <script>
      // Globally intercept malformed URIs at the absolute earliest point (before any CDN or local scripts run)
      (function() {
        var originalDecodeURIComponent = window.decodeURIComponent;
        window.decodeURIComponent = function(str) {
          if (typeof str !== 'string') return originalDecodeURIComponent(str);
          try {
            return originalDecodeURIComponent(str);
          } catch (e) {
            if (e instanceof URIError) {
              console.warn("[Global Intercept] Caught malformed URI in decodeURIComponent:", str);
              try {
                // Sanitize raw percent signs not followed by 2 hex digits by replacing % with %25
                var sanitized = str.replace(/%(?![0-9a-fA-F]{2})/g, '%25');
                return originalDecodeURIComponent(sanitized);
              } catch (innerErr) {
                return str; // Return the original string as-is if decoding still fails
              }
            }
            throw e;
          }
        };

        var originalDecodeURI = window.decodeURI;
        window.decodeURI = function(str) {
          if (typeof str !== 'string') return originalDecodeURI(str);
          try {
            return originalDecodeURI(str);
          } catch (e) {
            if (e instanceof URIError) {
              console.warn("[Global Intercept] Caught malformed URI in decodeURI:", str);
              try {
                var sanitized = str.replace(/%(?![0-9a-fA-F]{2})/g, '%25');
                return originalDecodeURI(sanitized);
              } catch (innerErr) {
                return str;
              }
            }
            throw e;
          }
        };
      })();
    </script>

      #error-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #ff5555; z-index: 99999; padding: 20px; font-family: monospace; overflow: auto; white-space: pre-wrap; }
    </style>
</head>
  <body>
    <div id="error-overlay"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        const overlay = document.getElementById('error-overlay');
        if (overlay) {
          overlay.style.display = 'block';
          overlay.innerText += `Error: ${message}\nSource: ${source}:${lineno}:${colno}\n\n`;
        }
      };
      window.addEventListener('unhandledrejection', function(event) {
        const overlay = document.getElementById('error-overlay');
        if (overlay) {
          overlay.style.display = 'block';
          overlay.innerText += `Promise Rejection: ${event.reason}\n\n`;
        }
      });
    </script>

  </body>
